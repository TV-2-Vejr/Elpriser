name: Opdater elpriser

on:
  workflow_dispatch: 

permissions:
  contents: write
  
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer dependencies
        run: pip install requests

      - name: Kør script
        run: python script.py

      - name: Commit & push CSV filer
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.csv extrema.csv
          git commit -m "Auto update data $(date -u)" || echo "No changes to commit"
          # Bruger GITHUB_TOKEN automatisk for det nuværende repo
          git push
